name: Employee App CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      # Step 1 - Download the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Step 3 - Install Backend Dependencies
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      # Step 4 - Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5 - Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t diyakhanna12/employee-app-backend:latest ./backend

      # Step 6 - Push Backend Image
      - name: Push Backend Image
        run: |
          docker push diyakhanna12/employee-app-backend:latest

      # Step 7 - Build Frontend Image
      - name: Build Frontend Image
        run: |
          docker build -t diyakhanna12/employee-app-frontend:latest ./frontend

      # Step 8 - Push Frontend Image
      - name: Push Frontend Image
        run: |
          docker push diyakhanna12/employee-app-frontend:latest

      # Step 9 - Success Message
      - name: Build Completed
        run: echo "CI Pipeline Completed Successfully!"

      # Step 10 - Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/employee-app
            docker compose pull
            docker compose up -d
