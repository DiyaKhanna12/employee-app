services:

  database:
    image: postgres:16

    container_name: postgres-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: diya
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: employee_db

    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diya -d employee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env

    ports:
      - "5000:5000"

    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: employee-frontend

    ports:
      - "8081:80"

    depends_on:
      - backend
    
volumes:
  postgres-data:
